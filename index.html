<!DOCTYPE html>

<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#141518;color:#e8e8e8;font-size:14px;min-height:100vh;padding:1rem 1.25rem 3rem}
.header{padding:0.5rem 0 0.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:0.5px solid #2a2b2f;padding-bottom:0.75rem;margin-bottom:0.75rem}
.header h1{font-size:16px;font-weight:500;color:#fff}
.status{font-size:12px;color:#666}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:0.75rem 0}
.filter-btn{padding:4px 12px;border-radius:20px;border:0.5px solid #333;background:transparent;cursor:pointer;font-size:12px;color:#888;transition:all 0.15s}
.filter-btn.active{background:#23242a;color:#e8e8e8;border-color:#555}
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:0.75rem 0 1rem}
.metric{background:#1e1f24;border:0.5px solid #2a2b2f;border-radius:8px;padding:0.75rem 1rem}
.metric-label{font-size:12px;color:#666;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500;color:#fff}
.metric-sub{font-size:11px;color:#555;margin-top:2px}
.section-label{font-size:11px;font-weight:500;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin:1.25rem 0 0.5rem}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px}
.card{background:#1e1f24;border:0.5px solid #2a2b2f;border-radius:12px;padding:1rem 1.25rem;transition:border-color 0.15s}
.card:hover{border-color:#444}
.card-event{font-size:11px;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.03em}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-title{font-size:13px;font-weight:500;color:#e8e8e8;line-height:1.4;max-width:75%}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge-macro{background:#0C447C;color:#B5D4F4}
.badge-equity{background:#27500A;color:#C0DD97}
.badge-event{background:#633806;color:#FAC775}
.badge-distressed{background:#791F1F;color:#F7C1C1}
.prob-row{display:flex;align-items:center;gap:10px;margin:8px 0}
.prob-bar-track{flex:1;height:6px;background:#2a2b2f;border-radius:3px;overflow:hidden}
.prob-bar-fill{height:100%;border-radius:3px}
.card-meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.meta-item{font-size:11px;color:#555}
.meta-item span{color:#aaa;font-weight:500}
.delta-up{color:#639922}
.delta-down{color:#E24B4A}
.sentiment-tag{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
.bull{background:#1a2e0a;color:#639922;border:0.5px solid #3B6D11}
.bear{background:#2e0a0a;color:#E24B4A;border:0.5px solid #A32D2D}
.neut{background:#23242a;color:#888;border:0.5px solid #333}
.loading{text-align:center;padding:3rem;color:#555}
.error-msg{text-align:center;padding:2rem;color:#555;font-size:13px;border:0.5px dashed #2a2b2f;border-radius:12px}
.refresh-btn{padding:4px 12px;border-radius:8px;border:0.5px solid #333;background:transparent;cursor:pointer;font-size:12px;color:#666}
.refresh-btn:hover{background:#23242a;color:#aaa}
.empty{color:#555;font-size:13px;padding:1.5rem 0;text-align:center}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Kalshi — market sentiment layer</h1>
    <div class="status" id="status">Loading live data...</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">Refresh</button>
</div>

<div class="summary-row" id="summary"></div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('macro',this)">Macro</button>
  <button class="filter-btn" onclick="setFilter('equity',this)">Equity / sector</button>
  <button class="filter-btn" onclick="setFilter('event',this)">M&A / events</button>
  <button class="filter-btn" onclick="setFilter('distressed',this)">Distressed</button>
</div>

<div id="content"><div class="loading">Fetching Kalshi markets...</div></div>

<script>
let allMarkets = [];
let activeFilter = 'all';

const FINANCIAL_EVENT_PREFIXES = [
  'KXINFL','KXCPI','KXFED','KXFOMC','KXRATE','KXGDP','KXUNEMP',
  'KXPAYROLL','KXPCE','KXHOUSING','KXOIL','KXGOLD','KXBTC','KXETH',
  'KXCRYPTO','KXSP500','KXNASDAQ','KXDOW','KXVIX','KXEARNINGS',
  'KXACQ','KXMERGER','KXIPO','KXBANK','KXDEFAULT','KXTARIFF',
  'KXTRADE','KXDEBT','KXDEFICIT','KXRECESS','KXAPPL','KXNVDA',
  'KXTSLA','KXMETA','KXGOOG','KXAMZN','KXMSFT','KXJPM','KXGS',
  'KXDOLLAR','KXYIELD','KXTREASURY','KXPOLITICS','KXELECT'
];

const FINANCIAL_KEYWORDS = [
  'federal reserve','fed funds','rate cut','rate hike','interest rate','fomc',
  'cpi','inflation','core pce','gdp','recession','unemployment','nonfarm payroll',
  'treasury yield','tariff','trade war','trade deficit','debt ceiling',
  'bitcoin','ethereum','crypto','btc','eth',
  's&p 500','sp500','nasdaq','dow jones','russell 2000','vix',
  'earnings per share','eps','revenue','stock price','market cap',
  'acquisition','merger','takeover','ipo','bankruptcy','chapter 11','default',
  'oil price','gold price','brent crude','natural gas',
  'us dollar','exchange rate','fed chair','treasury secretary',
  'jobs report','retail sales','consumer price','producer price',
  'apple stock','nvidia','tesla','meta platforms','alphabet','amazon','microsoft',
  'jpmorgan','goldman sachs','bear market','bull market','market crash',
  'will the fed','will inflation','will gdp','will unemployment','will bitcoin',
  'will trump','will congress','will the s&p','will nasdaq','will oil'
];

const HARD_SPORTS_EXCLUDE = [
  'wins by over','runs scored','points scored','goals scored','yards','touchdowns',
  'strikeouts','home runs','rebounds','assists','nba finals','mlb','nfl','nhl',
  'super bowl','world series','stanley cup','champions league','premier league',
  'grand slam','wimbledon','us open','french open','australian open',
  'ufc','mma','boxing','wrestling','formula 1','nascar race'
];

function isFinancial(m) {
  const title = (m.title || m.question || '').toLowerCase();
  if (HARD_SPORTS_EXCLUDE.some(k => title.includes(k))) return false;
  return true;
}

const CATEGORY_RULES = [
  {cat:'distressed', keywords:['bankrupt','chapter 11','default','restructur','distress','insolvency']},
  {cat:'event', keywords:['acqui','merger','takeover','buyout','ipo','spin','delist','deal']},
  {cat:'equity', keywords:['s&p','nasdaq','dow','russell','vix','sp500','earnings','eps','apple','nvidia','tesla','meta','alphabet','amazon','microsoft','jpmorgan','goldman','stock price']},
  {cat:'macro', keywords:['fed','rate','cpi','inflation','gdp','recession','unemployment','payroll','fomc','treasury','yield','tariff','trade','deficit','debt','bitcoin','crypto','oil','gold','dollar','exchange rate','housing','retail sales','jobs']}
];

function categorize(title) {
  const t = title.toLowerCase();
  for (const r of CATEGORY_RULES) {
    if (r.keywords.some(k => t.includes(k))) return r.cat;
  }
  return 'macro';
}

function getProb(m) {
  const fields = ['yes_bid_dollars','last_price_dollars','yes_ask_dollars','yes_bid','yes_ask','last_price'];
  for (const f of fields) {
    const v = m[f];
    if (v !== undefined && v !== null && v !== '' && !isNaN(v)) {
      const n = parseFloat(v);
      if (n > 0 && n <= 1) return Math.round(n * 100);
      if (n > 1 && n <= 100) return Math.round(n);
    }
  }
  return null;
}

function getPrevProb(m) {
  const fields = ['previous_yes_bid_dollars','previous_price_dollars','previous_yes_ask_dollars'];
  for (const f of fields) {
    const v = m[f];
    if (v !== undefined && v !== null && v !== '' && !isNaN(v)) {
      const n = parseFloat(v);
      if (n > 0 && n <= 1) return Math.round(n * 100);
      if (n > 1 && n <= 100) return Math.round(n);
    }
  }
  return null;
}

function getVolume(m) {
  const fields = ['volume_dollars','volume','notional_value_dollars','open_interest_dollars','open_interest'];
  for (const f of fields) {
    const v = m[f];
    if (v !== undefined && v !== null && !isNaN(v) && parseFloat(v) > 0) return parseFloat(v);
  }
  return 0;
}

function sentimentFromProb(p) {
  if (p >= 65) return {label:'bullish', cls:'bull'};
  if (p <= 35) return {label:'bearish', cls:'bear'};
  return {label:'neutral', cls:'neut'};
}

function barColor(p) {
  if (p >= 65) return '#639922';
  if (p <= 35) return '#E24B4A';
  return '#555';
}

function fmtVol(v) {
  if (!v || v === 0) return '—';
  if (v >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
  if (v >= 1000) return '$' + Math.round(v/1000) + 'K';
  return '$' + Math.round(v);
}

function cleanTitle(m) {
  const event = m.event_ticker || '';
  const title = m.title || m.question || 'Unnamed';
  const subtitle = m.sub_title || m.subtitle || '';
  if (subtitle && subtitle.length < 120) return subtitle;
  if (title.startsWith('yes ') || title.includes(',yes ') || title.includes(',no ')) {
    return event.replace(/KX[A-Z]+[-_]?/,'').replace(/[-_]/g,' ').toLowerCase() || title.slice(0,80);
  }
  return title;
}

function renderCards(markets) {
  const filtered = activeFilter === 'all' ? markets : markets.filter(m => m._cat === activeFilter);
  const buckets = {macro:[],equity:[],event:[],distressed:[]};
  filtered.forEach(m => buckets[m._cat]?.push(m));

  let html = '';
  const sections = activeFilter === 'all'
    ? [['distressed','M&A, distressed & events'],['event','Corporate events'],['equity','Equity & sector'],['macro','Macro & economic']]
    : [[activeFilter,'']];

  for (const [cat, label] of sections) {
    const list = activeFilter === 'all' ? buckets[cat] : filtered;
    if (!list.length) continue;
    if (label) html += `<div class="section-label">${label}</div>`;
    html += '<div class="card-grid">';
    list.forEach(m => {
      const prob = getProb(m);
      const prevProb = getPrevProb(m);
      const vol = getVolume(m);
      const displayProb = prob !== null ? prob : '?';
      const sent = prob !== null ? sentimentFromProb(prob) : {label:'unknown', cls:'neut'};
      const delta = (prob !== null && prevProb !== null && prevProb > 0) ? prob - prevProb : null;
      const dStr = delta !== null && delta !== 0 ? (delta > 0 ? '+' : '') + delta + '%' : null;
      const badgeMap = {macro:'badge-macro',equity:'badge-equity',event:'badge-event',distressed:'badge-distressed'};
      const catLabel = {macro:'macro',equity:'equity',event:'M&A / event',distressed:'distressed'};
      const barW = prob !== null ? prob : 50;
      const eventLabel = (m.event_ticker || '').replace(/KX[A-Z]+-?/,'').replace(/-/g,' ');
      const displayTitle = cleanTitle(m);

      html += `<div class="card">
        ${eventLabel ? `<div class="card-event">${eventLabel}</div>` : ''}
        <div class="card-top">
          <div class="card-title">${displayTitle}</div>
          <span class="badge ${badgeMap[m._cat]}">${catLabel[m._cat]}</span>
        </div>
        <div class="prob-row">
          <div class="prob-bar-track"><div class="prob-bar-fill" style="width:${barW}%;background:${barColor(barW)}"></div></div>
          <div style="font-size:13px;font-weight:500;min-width:36px;text-align:right;color:${barColor(barW)}">${displayProb}%</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:4px">
          <span class="sentiment-tag ${sent.cls}">${sent.label}</span>
          ${dStr ? `<span class="meta-item ${delta > 0 ? 'delta-up' : 'delta-down'}">24h: ${dStr}</span>` : ''}
        </div>
        <div class="card-meta">
          <div class="meta-item">Vol <span>${fmtVol(vol)}</span></div>
          ${m.close_time ? `<div class="meta-item">Resolves <span>${new Date(m.close_time).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'})}</span></div>` : ''}
        </div>
      </div>`;
    });
    html += '</div>';
  }
  if (!html) html = '<div class="empty">No financial markets found in this category.</div>';
  document.getElementById('content').innerHTML = html;
}

function renderSummary(markets) {
  const bull = markets.filter(m => { const p = getProb(m); return p !== null && p >= 65; }).length;
  const bear = markets.filter(m => { const p = getProb(m); return p !== null && p <= 35; }).length;
  const events = markets.filter(m => m._cat === 'distressed' || m._cat === 'event').length;
  const totalVol = markets.reduce((s,m) => s + getVolume(m), 0);
  document.getElementById('summary').innerHTML = `
    <div class="metric"><div class="metric-label">Markets tracked</div><div class="metric-value">${markets.length}</div><div class="metric-sub">financial contracts</div></div>
    <div class="metric"><div class="metric-label">Bullish bias</div><div class="metric-value" style="color:#639922">${bull}</div><div class="metric-sub">contracts &gt;65%</div></div>
    <div class="metric"><div class="metric-label">Bearish bias</div><div class="metric-value" style="color:#E24B4A">${bear}</div><div class="metric-sub">contracts ≤35%</div></div>
    <div class="metric"><div class="metric-label">Event / distressed</div><div class="metric-value" style="color:#BA7517">${events}</div><div class="metric-sub">M&A + bankruptcy</div></div>
    <div class="metric"><div class="metric-label">Total volume</div><div class="metric-value">${fmtVol(totalVol)}</div><div class="metric-sub">across all markets</div></div>
  `;
}

function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCards(allMarkets);
}

async function loadData() {
  document.getElementById('status').textContent = 'Fetching live data...';
  document.getElementById('content').innerHTML = '<div class="loading">Fetching Kalshi markets...</div>';
  try {
    let allFetched = [];
    let cursor = null;
    let pages = 0;

    do {
      const params = new URLSearchParams({ path: '/markets', limit: 200, status: 'open' });
      if (cursor) params.set('cursor', cursor);
      const res = await fetch(`https://market-sentiment-db.vercel.app/api/proxy?${params}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const batch = data.markets || [];
      allFetched = allFetched.concat(batch);
      cursor = data.cursor || null;
      pages++;
    } while (cursor && pages < 8);

    allMarkets = allFetched
      .filter(m => isFinancial(m))
      .map(m => ({...m, _cat: categorize(m.title || m.question || '')}))
      .sort((a,b) => getVolume(b) - getVolume(a));

    renderSummary(allMarkets);
    renderCards(allMarkets);
    document.getElementById('status').textContent = `Last updated ${new Date().toLocaleTimeString()} — ${allMarkets.length} financial markets (${allFetched.length} total scanned)`;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error-msg"><div style="font-weight:500;margin-bottom:6px">Error loading data</div><div style="font-size:12px">${e.message}</div></div>`;
    document.getElementById('status').textContent = 'Error — see message below';
  }
}

loadData();
</script>

</body>
</html>
