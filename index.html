<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#141518;color:#e8e8e8;font-size:14px;min-height:100vh;padding:1rem 1.25rem 3rem}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:0.5px solid #2a2b2f;padding-bottom:0.75rem;margin-bottom:0.75rem}
.header h1{font-size:16px;font-weight:500;color:#fff}
.status{font-size:12px;color:#555;margin-top:2px}
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:0.75rem 0 1rem}
.metric{background:#1e1f24;border:0.5px solid #2a2b2f;border-radius:8px;padding:0.65rem 0.85rem}
.metric-label{font-size:11px;color:#555;margin-bottom:3px}
.metric-value{font-size:20px;font-weight:500;color:#fff}
.metric-sub{font-size:10px;color:#444;margin-top:1px}
.fg-bar{height:6px;border-radius:3px;margin-top:6px;background:linear-gradient(to right,#E24B4A,#E2844A,#888,#639922)}
.fg-marker{width:10px;height:10px;border-radius:50%;background:#fff;margin-top:-8px;position:relative}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:0.5rem 0 1rem}
.filter-btn{padding:4px 12px;border-radius:20px;border:0.5px solid #2a2b2f;background:transparent;cursor:pointer;font-size:12px;color:#666}
.filter-btn.active{background:#23242a;color:#e8e8e8;border-color:#444}
.section-label{font-size:11px;font-weight:500;color:#444;text-transform:uppercase;letter-spacing:0.05em;margin:1.25rem 0 0.5rem}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px}
.card{background:#1e1f24;border:0.5px solid #2a2b2f;border-radius:12px;padding:1rem 1.1rem}
.card:hover{border-color:#3a3b40}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-entity{font-size:15px;font-weight:600;color:#fff}
.card-count{font-size:11px;color:#555;margin-top:2px}
.signal-badge{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap;font-weight:500}
.signal-aligned{background:#1a2e0a;color:#639922;border:0.5px solid #3B6D11}
.signal-diverging{background:#2e1a0a;color:#E2844A;border:0.5px solid #8B4513}
.signal-news{background:#23242a;color:#888;border:0.5px solid #333}
.divider{height:0.5px;background:#2a2b2f;margin:10px 0}
.sent-tag{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
.bull{background:#1a2e0a;color:#639922;border:0.5px solid #3B6D11}
.bear{background:#2e0a0a;color:#E24B4A;border:0.5px solid #A32D2D}
.neut{background:#23242a;color:#666;border:0.5px solid #333}
.news-list{display:flex;flex-direction:column;gap:6px}
.news-item{font-size:12px;color:#aaa;line-height:1.4;display:flex;gap:6px;align-items:flex-start}
.news-src{font-size:10px;color:#444;white-space:nowrap;padding-top:1px;min-width:80px}
.kalshi-block{background:#141518;border-radius:8px;padding:8px 10px;margin-top:4px}
.kalshi-title{font-size:12px;color:#aaa;line-height:1.4;margin-bottom:6px}
.prob-row{display:flex;align-items:center;gap:8px}
.prob-bar-track{flex:1;height:5px;background:#2a2b2f;border-radius:3px;overflow:hidden}
.prob-bar-fill{height:100%;border-radius:3px}
.prob-pct{font-size:12px;font-weight:600;min-width:32px;text-align:right}
.kalshi-meta{font-size:11px;color:#444;margin-top:5px}
.no-kalshi{font-size:11px;color:#333;font-style:italic;margin-top:4px}
.refresh-btn{padding:4px 12px;border-radius:8px;border:0.5px solid #2a2b2f;background:transparent;cursor:pointer;font-size:12px;color:#555}
.refresh-btn:hover{background:#23242a;color:#aaa}
.loading{text-align:center;padding:3rem;color:#444}
.empty{color:#444;font-size:13px;padding:2rem 0;text-align:center}
.error{text-align:center;padding:2rem;color:#444;font-size:13px;border:0.5px dashed #2a2b2f;border-radius:12px}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Market sentiment dashboard</h1>
    <div class="status" id="status">Loading...</div>
  </div>
  <button class="refresh-btn" onclick="init()">Refresh</button>
</div>

<div class="summary-row" id="summary"></div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('macro',this)">Macro</button>
  <button class="filter-btn" onclick="setFilter('equity',this)">Equity</button>
  <button class="filter-btn" onclick="setFilter('crypto',this)">Crypto</button>
  <button class="filter-btn" onclick="setFilter('event',this)">M&A / events</button>
</div>

<div id="content"><div class="loading">Pulling news + Kalshi data...</div></div>

<script>
const PROXY = "https://market-sentiment-db.vercel.app/api/proxy";
const NEWS_PROXY = "https://market-sentiment-db.vercel.app/api/news";

const ENTITIES = [
  {id:'fed-rate', label:'Fed rate decision', terms:['fed','federal reserve','rate cut','rate hike','fomc','interest rate','powell'], cat:'macro', kalshiSearch:'fed rate'},
  {id:'inflation', label:'Inflation / CPI', terms:['inflation','cpi','pce','consumer price'], cat:'macro', kalshiSearch:'inflation'},
  {id:'recession', label:'Recession risk', terms:['recession','gdp','economic slowdown'], cat:'macro', kalshiSearch:'recession'},
  {id:'tariffs', label:'Tariffs / trade', terms:['tariff','trade war','trade deal','trade policy'], cat:'macro', kalshiSearch:'tariff'},
  {id:'jobs', label:'Jobs / unemployment', terms:['jobs report','unemployment','payroll','nonfarm','labor'], cat:'macro', kalshiSearch:'unemployment'},
  {id:'yields', label:'Treasury yields', terms:['treasury yield','bond yield','yield curve','10 year'], cat:'macro', kalshiSearch:'treasury'},
  {id:'NVDA', label:'Nvidia $NVDA', terms:['nvda','nvidia'], cat:'equity', kalshiSearch:'nvidia'},
  {id:'AAPL', label:'Apple $AAPL', terms:['aapl','apple stock','apple earnings'], cat:'equity', kalshiSearch:'apple'},
  {id:'TSLA', label:'Tesla $TSLA', terms:['tsla','tesla'], cat:'equity', kalshiSearch:'tesla'},
  {id:'MSFT', label:'Microsoft $MSFT', terms:['msft','microsoft'], cat:'equity', kalshiSearch:'microsoft'},
  {id:'SPY', label:'S&P 500', terms:['s&p 500','sp500','s&p','market rally','market selloff','stock market'], cat:'equity', kalshiSearch:'s&p'},
  {id:'BTC', label:'Bitcoin', terms:['bitcoin','btc'], cat:'crypto', kalshiSearch:'bitcoin'},
  {id:'ETH', label:'Ethereum', terms:['ethereum','eth'], cat:'crypto', kalshiSearch:'ethereum'},
  {id:'crypto', label:'Crypto market', terms:['crypto','cryptocurrency'], cat:'crypto', kalshiSearch:'crypto'},
  {id:'ma', label:'M&A activity', terms:['acquisition','merger','takeover','buyout','acquired'], cat:'event', kalshiSearch:'acquisition'},
  {id:'ipo', label:'IPO market', terms:['ipo','initial public offering','going public'], cat:'event', kalshiSearch:'ipo'},
  {id:'bankruptcy', label:'Bankruptcy / distress', terms:['bankruptcy','chapter 11','default','restructuring'], cat:'event', kalshiSearch:'bankruptcy'},
];

const BULL_WORDS = ['surge','rally','rise','gain','jump','beat','strong','bullish','buy','upside','outperform','growth','record','high','boost'];
const BEAR_WORDS = ['crash','fall','drop','decline','miss','weak','bearish','sell','downside','underperform','recession','risk','concern','warn','low','cut'];

function scoreSentiment(texts) {
  let score = 0;
  const combined = texts.join(' ').toLowerCase();
  BULL_WORDS.forEach(w => { if (combined.includes(w)) score++; });
  BEAR_WORDS.forEach(w => { if (combined.includes(w)) score--; });
  if (score > 0) return 'bull';
  if (score < 0) return 'bear';
  return 'neut';
}

function getProb(m) {
  const fields = ['yes_bid_dollars','last_price_dollars','yes_ask_dollars'];
  for (const f of fields) {
    const v = parseFloat(m[f]);
    if (!isNaN(v) && v > 0) return v <= 1 ? Math.round(v*100) : Math.round(v);
  }
  return null;
}

function fmtVol(m) {
  const v = parseFloat(m.volume_dollars || m.volume_fp || 0);
  if (v >= 1000000) return '$'+(v/1000000).toFixed(1)+'M';
  if (v >= 1000) return '$'+Math.round(v/1000)+'K';
  if (v > 0) return '$'+Math.round(v);
  return null;
}

function barColor(p) {
  if (p >= 65) return '#639922';
  if (p <= 35) return '#E24B4A';
  return '#555';
}

function computeSignal(sentiment, kalshiMarkets) {
  if (!kalshiMarkets.length) return 'news';
  const probs = kalshiMarkets.map(m => getProb(m)).filter(p => p !== null);
  if (!probs.length) return 'news';
  const avg = probs.reduce((a,b)=>a+b,0)/probs.length;
  if ((sentiment==='bull' && avg>=55)||(sentiment==='bear' && avg<=45)) return 'aligned';
  if ((sentiment==='bull' && avg<=45)||(sentiment==='bear' && avg>=55)) return 'diverging';
  return 'news';
}

async function fetchNews() {
  const res = await fetch(`${NEWS_PROXY}?type=news`);
  if (!res.ok) throw new Error(`News proxy ${res.status}`);
  const data = await res.json();
  return data.items || [];
}

async function fetchFearGreed() {
  try {
    const res = await fetch(`${NEWS_PROXY}?type=feargreed`);
    if (!res.ok) return null;
    const data = await res.json();
    return data?.fear_and_greed || data?.fng_value || null;
  } catch(e) { return null; }
}

async function fetchKalshi(term) {
  try {
    const params = new URLSearchParams({ path:'/markets', status:'open', search:term, limit:3 });
    const res = await fetch(`${PROXY}?${params}`);
    if (!res.ok) return [];
    const data = await res.json();
    const SPORTS = ['KXNBA','KXMLB','KXNFL','KXNHL','KXMVE','KXTENNIS','KXUFC','KXSOCCER','KXGOLF'];
    return (data.markets||[]).filter(m => {
      const ev = (m.event_ticker||'').toUpperCase();
      return !SPORTS.some(p => ev.startsWith(p));
    }).slice(0,2);
  } catch(e) { return []; }
}

function matchNews(items, entity) {
  return items.filter(item => {
    const t = (item.title + ' ' + item.description).toLowerCase();
    return entity.terms.some(term => t.includes(term.toLowerCase()));
  }).slice(0, 5);
}

let allCards = [];
let activeFilter = 'all';

function renderSummary(fg) {
  const bull = allCards.filter(c=>c.sentiment==='bull').length;
  const bear = allCards.filter(c=>c.sentiment==='bear').length;
  const aligned = allCards.filter(c=>c.signal==='aligned').length;
  const diverging = allCards.filter(c=>c.signal==='diverging').length;

  let fgHtml = '';
  if (fg) {
    const score = parseInt(fg.score || fg.value || 50);
    const label = fg.rating || fg.value_classification || '';
    const color = score >= 60 ? '#639922' : score <= 40 ? '#E24B4A' : '#888';
    fgHtml = `<div class="metric">
      <div class="metric-label">Fear & Greed</div>
      <div class="metric-value" style="color:${color}">${score}</div>
      <div class="metric-sub">${label}</div>
    </div>`;
  }

  document.getElementById('summary').innerHTML = `
    <div class="metric"><div class="metric-label">Topics tracked</div><div class="metric-value">${allCards.length}</div><div class="metric-sub">with news activity</div></div>
    <div class="metric"><div class="metric-label">Bullish tilt</div><div class="metric-value" style="color:#639922">${bull}</div><div class="metric-sub">topics</div></div>
    <div class="metric"><div class="metric-label">Bearish tilt</div><div class="metric-value" style="color:#E24B4A">${bear}</div><div class="metric-sub">topics</div></div>
    <div class="metric"><div class="metric-label">Aligned</div><div class="metric-value" style="color:#639922">${aligned}</div><div class="metric-sub">news = Kalshi</div></div>
    <div class="metric"><div class="metric-label">Diverging</div><div class="metric-value" style="color:#E2844A">${diverging}</div><div class="metric-sub">news ≠ Kalshi</div></div>
    ${fgHtml}
  `;
}

function renderCards() {
  const filtered = activeFilter === 'all' ? allCards : allCards.filter(c=>c.cat===activeFilter);
  if (!filtered.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No topics with news activity in this category.</div>';
    return;
  }
  const sections = activeFilter==='all'
    ? [['event','M&A, distressed & events'],['equity','Equity & sector'],['crypto','Crypto'],['macro','Macro & economic']]
    : [[activeFilter,'']];

  let html = '';
  for (const [cat, label] of sections) {
    const list = activeFilter==='all' ? filtered.filter(c=>c.cat===cat) : filtered;
    if (!list.length) continue;
    if (label) html += `<div class="section-label">${label}</div>`;
    html += '<div class="card-grid">';
    list.forEach(c => {
      const sentCls = c.sentiment==='bull'?'bull':c.sentiment==='bear'?'bear':'neut';
      const sentLabel = c.sentiment==='bull'?'bullish':c.sentiment==='bear'?'bearish':'neutral';
      const sigCls = c.signal==='aligned'?'signal-aligned':c.signal==='diverging'?'signal-diverging':'signal-news';
      const sigLabel = c.signal==='aligned'?'⬆ aligned':c.signal==='diverging'?'⚡ diverging':'news only';

      const kalshiHtml = c.kalshi.length ? c.kalshi.map(m => {
        const prob = getProb(m);
        const vol = fmtVol(m);
        const title = (m.title||m.question||'').slice(0,90);
        return `<div class="kalshi-block">
          <div class="kalshi-title">${title}</div>
          ${prob!==null?`<div class="prob-row">
            <div class="prob-bar-track"><div class="prob-bar-fill" style="width:${prob}%;background:${barColor(prob)}"></div></div>
            <div class="prob-pct" style="color:${barColor(prob)}">${prob}%</div>
          </div>`:''}
          <div class="kalshi-meta">${vol?'Vol '+vol+' · ':''}Resolves ${m.close_time?new Date(m.close_time).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—'}</div>
        </div>`;
      }).join('') : '<div class="no-kalshi">No Kalshi contract found</div>';

      html += `<div class="card">
        <div class="card-header">
          <div>
            <div class="card-entity">${c.label}</div>
            <div class="card-count">${c.news.length} headline${c.news.length>1?'s':''}</div>
          </div>
          <span class="signal-badge ${sigCls}">${sigLabel}</span>
        </div>
        <span class="sent-tag ${sentCls}">${sentLabel}</span>
        <div class="divider"></div>
        <div style="font-size:11px;color:#444;margin-bottom:6px">TOP HEADLINES</div>
        <div class="news-list">
          ${c.news.slice(0,3).map(n=>`<div class="news-item">
            <span class="news-src">${n.source||'Yahoo'}</span>
            <span>${n.title.length>90?n.title.slice(0,87)+'...':n.title}</span>
          </div>`).join('')}
        </div>
        <div class="divider"></div>
        <div style="font-size:11px;color:#444;margin-bottom:6px">KALSHI CONTRACTS</div>
        ${kalshiHtml}
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('content').innerHTML = html || '<div class="empty">No topics found.</div>';
}

function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

async function init() {
  document.getElementById('status').textContent = 'Pulling news...';
  document.getElementById('content').innerHTML = '<div class="loading">Pulling news + Kalshi data...</div>';
  allCards = [];

  try {
    const [newsItems, fg] = await Promise.all([fetchNews(), fetchFearGreed()]);
    document.getElementById('status').textContent = `${newsItems.length} headlines — querying Kalshi...`;

    const results = await Promise.allSettled(ENTITIES.map(async entity => {
      const matched = matchNews(newsItems, entity);
      if (!matched.length) return null;
      const kalshi = await fetchKalshi(entity.kalshiSearch);
      const sentiment = scoreSentiment(matched.map(n=>n.title+' '+(n.description||'')));
      const signal = computeSignal(sentiment, kalshi);
      return { ...entity, news: matched, kalshi, sentiment, signal };
    }));

    allCards = results
      .filter(r=>r.status==='fulfilled'&&r.value!==null)
      .map(r=>r.value)
      .sort((a,b)=>b.news.length-a.news.length);

    renderSummary(fg);
    renderCards();
    document.getElementById('status').textContent = `Last updated ${new Date().toLocaleTimeString()} — ${allCards.length} topics tracked`;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error">Error: ${e.message}</div>`;
    document.getElementById('status').textContent = 'Error loading data';
  }
}

init();
</script>
</body>
</html>
